<title>布丁歌單</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍮</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&amp;family=Zen+Maru+Gothic:wght@400;500;700&amp;display=swap" rel="stylesheet"/>

<style>
.site-footer{
  position:relative;
  z-index:2;
  max-width:980px;
  margin:40px auto 24px;
  padding:22px 18px;
  text-align:center;
  font-family:"Zen Maru Gothic","Noto Serif TC",serif;
  color:rgba(92,62,38,.88);
  font-size:14px;
  line-height:1.8;
}

.site-footer p{
  margin:4px 0;
}

.site-footer a{
  color:rgba(92,62,38,.95);
  text-decoration:none;
  border-bottom:1px solid rgba(92,62,38,.35);
}

.site-footer a:hover{
  opacity:.75;
}

<body>
<div class="float-layer" id="floatLayer"></div>

<main class="wrap">
<section class="hero">
<span class="eyebrow">🍮 ♫</span>
<h1>🍮布丁の歌單</h1>
<p>走過路過歡迎一起來吃布丁吧。</p>

<div class="controls">
<input class="search" id="search" placeholder="搜尋歌名、歌手或分類…"/>
<button class="random" id="randomBtn" type="button">🎲 隨機抽歌</button>
</div>

<div class="tags" id="tags"></div>
<div class="meta"><span id="count">讀取中…</span><span class="status" id="status"></span></div>
</section>

<section class="grid" id="grid"></section>
<div class="empty" id="empty">沒有找到符合條件的歌曲</div>

  <div class="modal-card">
    <h2>🍮 布丁推薦</h2>
    <div class="big" id="pickSong"></div>
    <div id="pickArtist"></div>
